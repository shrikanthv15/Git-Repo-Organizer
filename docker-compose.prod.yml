# =============================================================================
# GitHub Gardener — Production Docker Compose (Coolify)
# =============================================================================
# Coolify deploys via Traefik reverse proxy. Services use `expose` (internal)
# instead of `ports` (host-mapped) so Traefik routes traffic by domain name.
# Set all environment variables in Coolify's UI or via .env on the server.
# =============================================================================

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gardener-network

  # ── Temporal Server ─────────────────────────────
  temporal:
    image: temporalio/auto-setup:latest
    restart: always
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
    expose:
      - "7233"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gardener-network

  # ── Temporal UI (optional — expose internally for admin access) ──
  temporal-ui:
    image: temporalio/ui:latest
    restart: always
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${FRONTEND_URL}
    expose:
      - "8080"
    depends_on:
      temporal:
        condition: service_started
    networks:
      - gardener-network

  # ── Backend (FastAPI) ───────────────────────────
  backend:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TEMPORAL_ADDRESS: temporal:7233
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      FRONTEND_URL: ${FRONTEND_URL}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - gardener-network

  # ── Temporal Worker ─────────────────────────────
  worker:
    build:
      context: ./backend
    restart: always
    command: python -m app.temporal.worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TEMPORAL_ADDRESS: temporal:7233
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LITELLM_API_BASE: ${LITELLM_API_BASE}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - gardener-network

  # ── Frontend (Next.js) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${NEXT_PUBLIC_GITHUB_CLIENT_ID}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - gardener-network
      - coolify

volumes:
  pgdata:

networks:
  gardener-network:
    driver: bridge
  coolify:               # <--- ADD THIS BLOCK
      external: true