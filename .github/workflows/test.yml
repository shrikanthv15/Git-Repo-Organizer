name: tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel earlier in-flight runs on the same ref when a new commit lands.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen --dev

      - name: Install dev extras (pytest-asyncio, pytest-cov)
        working-directory: backend
        run: uv pip install pytest-asyncio pytest-cov

      - name: Run pytest with coverage (≥60% gate)
        run: |
          uv --project backend run pytest \
            --cov-fail-under=60 \
            --cov-report=term-missing

      - name: Upload htmlcov artifact (if generated)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: htmlcov/
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: frontend (vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Vitest
        run: pnpm test

      - name: Build
        run: pnpm build
